spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/contacts_dev
    username: dev_user
    password: dev_password
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25

logging:
  level:
    root: INFO
    com.mycompany.contact_app: DEBUG
    org.hibernate.SQL: DEBUG