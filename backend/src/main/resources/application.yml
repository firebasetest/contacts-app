spring:
  profiles:
    active: dev # Default environment when running locally without flags
  application:
    name: contacts-app
  datasource:
    hikari:
      driver-class-name: org.postgresql.Driver
      jdbc-url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:contacts_db}
      username: ${DB_USER:postgres}
      password: ${DB_PASS:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false          
  jackson:
    default-property-inclusion: non_null
    serialization:
      write_dates_as_timestamps: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Replace with your actual Authorization Server issuer URI
          # For Firebase: https://securetoken.google.com/your-firebase-project-id
          issuer-uri: ${JWT_ISSUER_URI:https://securetoken.google.com/your-firebase-app-id}
          # Alternative if you prefer direct key validation endpoint:
          # jwk-set-uri: ${JWT_JWK_SET_URI:https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system}          
app:
  security:
    # Fallback to a dummy BCrypt hash string for local development initialization
    # Example plaintext token: "EMERGENCY_SECRET_2026_SUPER_VALID_TOKEN"
    # Generate its BCrypt hash and store it securely here:
    break-glass-token-hash: "$2a$12$e0MYz4D7b4t1MvQG2h8pEeJbW8gGgVCl.jTf/L5B7n6uX2kbywKkq"
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:ACdummy_account_sid_placeholder}
  auth-token: ${TWILIO_AUTH_TOKEN:dummy_auth_token_placeholder}
  from-number: ${TWILIO_FROM_NUMBER:+15550100}
# Global server execution properties
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always