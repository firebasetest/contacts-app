spring:
  datasource:
    hikari:
      driver-class-name: org.h2.Driver
      jdbc-url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never
# MOCK OAUTH2 FOR ISOLATED TESTING:
  # Prevents Spring from attempting to connect to external auth endpoints during unit testing phase
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:certs/public.key # or use standard MockJwtDecoder beans in test configurations

# Isolated static properties to satisfy injection configurations seamlessly
app:
  security:
    # A generic test BCrypt hash representing the text "test-secret"
    break-glass-token-hash: "$2a$10$wM7vC7RcoM7f7H6vH3f7O.7vH7RcoM7f7H6vH3f7O.7vH7RcoM7f7"

twilio:
  account-sid: "ACtest_mock_account_sid_12345"
  auth-token: "test_mock_auth_token_12345"
  from-number: "+15559999"
# Suppress verbose log noise during test suites execution
logging:
  level:
    root: WARN
    com.mycompany.contact_app: INFO
    org.springframework.web: INFO